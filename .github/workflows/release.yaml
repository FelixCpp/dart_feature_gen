name: Release

# pub.dev erlaubt automatisches Publizieren NUR bei Tag-Pushes.
# Ohne diesen Trigger lehnt pub.dev den Publish-Versuch ab.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Erforderlich für OIDC-Authentifizierung gegenüber pub.dev
    steps:
      - uses: actions/checkout@v4

      # setup-dart konfiguriert den OIDC-Token für pub.dev – dart pub publish
      # greift diesen automatisch ab. Kein Flutter-Download, da reines Dart-Paket.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: dart pub publish --force

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write # Erforderlich für das Erstellen eines GitHub Releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git cliff --current --strip all | gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file -
