name: Release

# pub.dev erlaubt automatisches Publizieren NUR bei Tag-Pushes.
# Ohne diesen Trigger lehnt pub.dev den Publish-Versuch ab.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    name: Publish to pub.dev
    # Der reusable workflow aus dart-lang/setup-dart übernimmt das komplette
    # OIDC-Handshake mit pub.dev – dies ist die offizielle Empfehlung von dart.dev.
    permissions:
      id-token: write # Erforderlich für OIDC-Authentifizierung gegenüber pub.dev
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write # Erforderlich für das Erstellen eines GitHub Releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git cliff --current --strip all | gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file -
