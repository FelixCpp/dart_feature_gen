name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Verhindert parallele Runs auf demselben Branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Statische Analyse & Format-Check
  # ─────────────────────────────────────────────
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

  # ─────────────────────────────────────────────
  # 2. Test-Matrix (Plattform × Dart-Kanal)
  # ─────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }} · Dart ${{ matrix.sdk }})
    needs: analyze
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false # Alle Plattformen durchlaufen, auch wenn eine scheitert
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        sdk: ["stable", "beta"]

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install dependencies
        run: dart pub get

      - name: Run tests with coverage
        run: dart test --coverage=coverage

      - name: Convert coverage to lcov
        if: matrix.os == 'ubuntu-latest' && matrix.sdk == 'stable'
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --report-on=lib

      # Coverage nur einmal hochladen (ubuntu + stable reicht)
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.sdk == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }} # Optional für public repos, Pflicht für private

  # ─────────────────────────────────────────────
  # 3. pub.dev Score (pana) – nur informativ
  # ─────────────────────────────────────────────
  pana:
    name: pub.dev Score (pana)
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install pana
        run: dart pub global activate pana

      - name: Run pana
        run: pana --no-warning .
