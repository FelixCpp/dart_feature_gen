name: Publish

# Triggered when the "Release" workflow completes successfully.
# Using workflow_run instead of push:tags is more reliable because
# a tag pushed by a workflow (even with a PAT) can sometimes fail to
# fire push:tags in a downstream workflow due to GitHub's bot-push rules.
#
# IMPORTANT: pub.dev OIDC requires refType=tag in the token.
# workflow_run does NOT provide this automatically – so we pass the tag
# explicitly to `dart pub publish` via PUB_TOKEN is NOT needed because
# dart-lang/setup-dart exchanges the OIDC token. However, to satisfy
# pub.dev's refType requirement we must trigger on the tag ref directly.
#
# Solution: workflow_run fires the job, but we checkout the tag ref
# AND use the GitHub API to trigger a repository_dispatch as a bridge
# – OR, simpler: we keep push:tags AND fix the upstream push to use
# the PAT explicitly (persist-credentials:false + remote set-url).
# With that fix in release.yml, push:tags reliably fires here.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # Create GitHub Release
  id-token: write # OIDC token for pub.dev (refType=tag from push trigger)

jobs:
  publish:
    name: Publish to pub.dev & Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the exact tagged commit ───────────────────
      - name: Checkout ${{ github.ref_name }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      # ── 2. Tooling ────────────────────────────────────────────
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: dart pub get

      # ── 4. Publish to pub.dev via OIDC ────────────────────────
      #    This workflow is triggered by push:tags, so GitHub sets
      #    refType=tag in the OIDC token – satisfying pub.dev's policy.
      #    dart-lang/setup-dart exchanges the token automatically.
      #    No PUB_TOKEN secret required.
      - name: Publish to pub.dev
        run: dart pub publish --force

      # ── 5. Extract release notes for this tag ─────────────────
      - name: Extract release notes
        id: release_notes
        run: |
          NOTES=$(git-cliff \
            --config cliff.toml \
            --latest \
            --strip header)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES"     >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      # ── 6. Create GitHub Release ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
