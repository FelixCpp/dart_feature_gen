name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (kein echtes Publishing)"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Pflicht für OIDC-Auth bei pub.dev
      contents: write # Pflicht für GitHub Release + Tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag does not exist yet
        if: ${{ !inputs.dry_run }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "❌ Tag $TAG existiert bereits! Bitte Version in pubspec.yaml erhöhen."
            exit 1
          fi

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: dart pub publish --dry-run

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: dart pub publish --force

      - name: Install git-cliff
        if: ${{ !inputs.dry_run }}
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md (if needed)
        if: ${{ !inputs.dry_run }}
        run: |
          git-cliff --tag ${{ steps.version.outputs.tag }} -o CHANGELOG.md
          if git diff --quiet CHANGELOG.md; then
            echo "✅ CHANGELOG.md ist bereits aktuell, nichts zu tun."
          else
            echo "📝 CHANGELOG.md wurde aktualisiert, committe Änderungen..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG.md for ${{ steps.version.outputs.tag }}"
            git push
          fi

      - name: Generate release notes with git-cliff
        if: ${{ !inputs.dry_run }}
        id: changelog
        run: |
          NOTES=$(git-cliff --tag ${{ steps.version.outputs.tag }} --unreleased --strip all)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Tag & GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
