name: Publish

# pub.dev OIDC requires refType=tag in the OIDC token.
# This is ONLY set when a workflow is triggered by `push: tags` directly –
# not by workflow_run, workflow_dispatch, or any other trigger.
# Therefore this file must be triggered by a tag push, not called from release.yml.
#
# The tag is pushed by release.yml using the RELEASE_PAT with
# persist-credentials:false + explicit remote URL, which causes GitHub to
# treat the push as a real user push and fire this trigger.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev
      contents: write # Required to create GitHub Release

    # Use the official dart-lang reusable publish workflow.
    # pub.dev explicitly supports and recognizes this workflow.
    # It handles OIDC token exchange with pub.dev automatically.
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Extract release notes
        id: release_notes
        run: |
          NOTES=$(git-cliff \
            --config cliff.toml \
            --latest \
            --strip header)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES"     >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
